<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Title & description -->
    <title>RealLife AI</title>
    <meta
      name="description"
      content="AI portrait enhancement that preserves identity to ±0.003 landmark delta. Enhance resolution, clarity, and lighting without shifting a single feature."
    />

    <!-- Open Graph — social sharing preview (Twitter, LinkedIn, iMessage, Slack, WeChat) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RealLife AI — Photoreal portraits, still unmistakably you." />
    <meta property="og:description" content="AI portrait enhancement that preserves identity to ±0.003 landmark delta." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://reallife.ai/" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RealLife AI — Photoreal portraits, still unmistakably you." />
    <meta name="twitter:description" content="AI portrait enhancement that preserves identity to ±0.003 landmark delta." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme color — affects mobile browser chrome (address bar, task switcher) -->
    <meta name="theme-color" content="#0A0A0A" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
